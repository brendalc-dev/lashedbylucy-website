<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
         <h1>
            <img src="images/logo.svg" alt="LasshedbyLucy Logo" class="logo">
        </h1>
        <nav>
            <a href="index.html">HOME</a>
            <a href="types.html">LASHETTE LOOKBOOK</a>
            <a href="gallery.html">LASH TIPS</a>
            <a href="contact.html">CONTACT US</a>
        </nav>
    </header>
    <main class="contact-container">
        <div class="form-image-container">
            <img src="images/info.svg" alt="Lash extensions process" class="contact-image">
            <form action="https://webdevbasics.net/scripts/demo.php" method="post" class="contact-form">
                <label for="firstname">First Name:</label>
                <input type="text" id="firstname" name="firstname" required>
                <label for="lastname">Last Name:</label>
                <input type="text" id="lastname" name="lastname" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5"></textarea>
                <input type="submit" value="Submit">
                <!-- Link beneath the submit button -->
                <p><a href="https://form.jotform.com/220837110706145" target="_blank" style="color: #d16b88;">Please click to submit consent form</a></p>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 LasshedbyLucy</p>
    </footer>
</body>
</html>
